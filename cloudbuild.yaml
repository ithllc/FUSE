steps:
  # Build the container image using Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:${SHORT_SHA}', '.']

  # Tag as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:${SHORT_SHA}', 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:latest']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:${SHORT_SHA}']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fuse-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'REDIS_HOST=10.8.239.3,PROJECT_ID=${PROJECT_ID},LOCATION=global'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--vpc-connector'
      - 'fuse-vpc-connector'
      - '--cpu'
      - '2'
      - '--memory'
      - '2Gi'
      - '--min-instances'
      - '1'
      - '--cpu-boost'
      - '--timeout'
      - '300'
      - '--session-affinity'
      - '--project'
      - '${PROJECT_ID}'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/fuse-repo/fuse-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
